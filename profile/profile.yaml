jarvis_projects:

  - name: "Linux Cluster Monitor"
    git_url: "/linux_sql"
    description: Developed a Bash-based monitoring tool to collect hardware specifications and resource usage from Linux machines. Designed PostgreSQL schemas for host and usage data, automated data collection using Cron, and containerized the database with Docker. Wrote SQL queries to analyze system usage and support operational insights.

  - name: "Java Grep Application"
    git_url: "/core_java/grep"
    description: Built a Java-based Grep application to search large text files using regular expressions. Implemented file traversal using Java NIO and Streams, applied lambda expressions for filtering and processing, and added logging with SLF4J. Packaged the application as a fat JAR using Maven and containerized it with Docker to ensure consistent execution across environments.

  - name: "London Gift Shop Retail Analytics and Customer Segmentation"
    git_url: "/python_data_analytics"
    description: Performed retail transactional data analysis to understand customer purchasing behavior. Queried structured sales data from PostgreSQL and validated aggregations using SQL (GROUP BY, HAVING). Implemented RFM (Recency, Frequency, Monetary) analysis in Python using Pandas and NumPy to segment customers based on buying patterns. Ensured data integrity through validation checks and transformed raw sales records into actionable business insights.

  - name: "Power BI Data Visualization Dashboards"
    git_url: "/powerbi_fundamentals"
    description: Developed interactive dashboards in Power BI using Power Query for data transformation and DAX for calculated metrics. Built dashboards analyzing beverage sales performance, survey data from data professionals, and Apple stock market trends using Alpha Vantage API data.

